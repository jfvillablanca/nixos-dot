# Build every buildable x86_64-linux output on push and PR; cachix-action
# pushes any new store paths to nixos-dot.cachix.org so a fresh machine can
# pull pre-built closures instead of rebuilding from source.
#
# The build matrix is generated dynamically (matrix-gen job) from the flake's
# own outputs: the CI host set (cimmerian, t14g1) plus every
# packages.x86_64-linux and devShells.x86_64-linux attr. Adding a package or
# devShell gets it built + cached with no edit here.
#
# Action revisions are pinned to exact SHAs (not tags) so a tag pointer being
# repointed at a malicious commit can't compromise the pipeline silently.
name: build-cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Emit the buildable-output matrix from the flake itself. Hosts are bounded to
  # the CI set (cimmerian, t14g1) to cap build cost -- the WSL/QEMU hosts
  # (sartre, defenestration, carcosa) are validated by eval, not a full build.
  matrix-gen:
    name: generate build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: install nix
        # cachix/install-nix-action@v31.10.5
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: enumerate buildable x86_64-linux outputs
        id: gen
        run: |
          set -euo pipefail
          hosts='["cimmerian","t14g1"]'
          pkgs=$(nix eval --json '.#packages.x86_64-linux' --apply builtins.attrNames)
          shells=$(nix eval --json '.#devShells.x86_64-linux' --apply builtins.attrNames)
          matrix=$(jq -cn \
            --argjson hosts "$hosts" \
            --argjson pkgs "$pkgs" \
            --argjson shells "$shells" '
            { include:
              [ ($hosts[]  | {name: ("host:"+.),  attr: ("nixosConfigurations."+.+".config.system.build.toplevel")}),
                ($pkgs[]   | {name: ("pkg:"+.),   attr: ("packages.x86_64-linux."+.)}),
                ($shells[] | {name: ("shell:"+.), attr: ("devShells.x86_64-linux."+.)}) ] }')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  build:
    name: build ${{ matrix.name }}
    needs: matrix-gen
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.matrix) }}

    steps:
      - name: free disk space
        # jlumbroso/free-disk-space@v1.3.1
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: install nix
        # cachix/install-nix-action@v31.10.5
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: cachix
        # cachix/cachix-action@v17
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: nixos-dot
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: hyprland

      - name: build ${{ matrix.name }}
        run: |
          nix build ".#${{ matrix.attr }}" --print-build-logs

  # Report-only build-based delta for the flake-update bot's PR (backlog F.5),
  # posted as a PR comment: the realized-runtime version diff (`dix`) and the
  # vulnix CVE report (active CVEs in the PR closure + new/fixed vs base). The
  # eval-only package version delta across ALL outputs (incl. darwin) lives in
  # the PR *body* (flake-update.yml, via .#flake-delta); this is the
  # build-based half -- cimmerian + t14g1 only (no realized darwin closure on
  # Linux). Never gates merge. Runs ONLY on the bot's PR (head `flake-update`).
  pr-delta:
    name: PR delta (runtime diff + CVEs)
    needs: build
    # `!cancelled()` so a flaky package build in `build` can't suppress the
    # report; this job rebuilds the hosts it needs itself.
    if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'flake-update' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: free disk space
        # jlumbroso/free-disk-space@v1.3.1
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: install nix
        # cachix/install-nix-action@v31.10.5
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: cachix
        # cachix/cachix-action@v17
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: nixos-dot
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: hyprland

      - name: build closures, dix runtime diff + vulnix CVE report, post comment
        env:
          GH_TOKEN: ${{ secrets.FLAKE_BOT_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          export LC_ALL=C   # stable collation so sort/comm agree
          hosts=(cimmerian t14g1)

          # Build the PR closures, then the base closures with the base
          # flake.lock overlaid (flake.nix is identical; only the lock moved).
          build_side() {
            local side=$1 h
            for h in "${hosts[@]}"; do
              nix build ".#nixosConfigurations.$h.config.system.build.toplevel" \
                -o "result-$side-$h" --print-build-logs
            done
          }
          build_side pr
          git checkout "$BASE_SHA" -- flake.lock
          build_side base
          git checkout HEAD -- flake.lock

          # Runtime version diff via dix --output json (nvd fallback) per host on
          # the realized out-paths. --force-correctness avoids the SQLite
          # immutable-mode path that can be flaky in CI. dix exits 0 on a clean diff.
          {
            echo "### Runtime closure diff (\`dix\`, cimmerian + t14g1)"
            echo
            echo "Exact realized-runtime version table. Linux hosts only -- darwin"
            echo "has no realized out-paths here (its eval-only delta is in the PR body)."
            echo
            for h in "${hosts[@]}"; do
              tbl=""
              if dixjson=$(nix run nixpkgs#dix -- --force-correctness --output json \
                    "result-base-$h" "result-pr-$h" 2>/dev/null) \
                 && printf '%s' "$dixjson" | jq -e '.diffs' >/dev/null 2>&1; then
                tbl=$(printf '%s' "$dixjson" | jq -r '
                  .diffs[] | . as $d
                  | ($d.versions | map(select(.kind=="changed")) | .[0]) as $c
                  | if $c then "\($d.name): \($c.old.name) -> \($c.new.name)"
                    else "\($d.name): \($d.status)" end')
              else
                tbl=$(nix run nixpkgs#nvd -- diff "result-base-$h" "result-pr-$h" 2>/dev/null \
                      | sed -n '/Version changes:/,$p' || true)
              fi
              n=$(printf '%s\n' "$tbl" | grep -c . || true)
              echo "<details><summary><b>$h</b> -- ${n} changed</summary>"
              echo; echo '```'
              if [ -n "$tbl" ]; then printf '%s\n' "$tbl"; else echo "(no version changes)"; fi
              echo '```'; echo "</details>"; echo
            done
          } > /tmp/runtime.md

          # vulnix per side. It exits non-zero when it finds CVEs, so `|| true`; a
          # *successful* scan always prints a JSON array -- validate that to tell
          # "0 CVEs" from "scan failed".
          scan_ok=1
          for side in pr base; do
            outs=()
            for h in "${hosts[@]}"; do outs+=("result-$side-$h"); done
            nix run nixpkgs#vulnix -- --json "${outs[@]}" \
              > "vulnix-$side.json" 2> "vulnix-$side.err" || true
            if jq -e 'type == "array"' "vulnix-$side.json" >/dev/null 2>&1; then
              # CVE ids are regex-extracted so we don't couple to vulnix's schema.
              grep -oE 'CVE-[0-9]{4}-[0-9]{4,}' "vulnix-$side.json" | sort -u > "$side.cve" || true
            else
              scan_ok=0
              : > "$side.cve"
              echo "::warning::vulnix $side scan produced no valid JSON output"
              sed "s/^/vulnix-$side.err: /" "vulnix-$side.err" >&2 || true
            fi
          done

          # Active CVEs in the PR closure: "CVE  CVSS  pkg-version", worst first.
          if [ "$scan_ok" -eq 1 ]; then
            jq -r '.[] | .pname as $p | .version as $v | (.cvssv3_basescore // {}) as $s
                   | .affected_by[] | [., ($s[.] // 0), ($p + "-" + $v)] | @tsv' vulnix-pr.json \
              | sort -t"$(printf '\t')" -k2 -rn \
              | awk -F'\t' '{printf "%-18s %4s  %s\n", $1, $2, $3}' > /tmp/present.txt || true
          fi
          npkg=$(jq 'length' vulnix-pr.json 2>/dev/null || echo 0)
          nbase=$(wc -l < base.cve); npr=$(wc -l < pr.cve)
          new=$(comm -23 pr.cve base.cve || true)
          fixed=$(comm -13 pr.cve base.cve || true)
          nnew=$(printf '%s\n' "$new" | grep -c . || true)
          nfix=$(printf '%s\n' "$fixed" | grep -c . || true)

          {
            echo "## Build-based PR delta -- runtime diff + CVEs"
            echo
            echo "Report only; does **not** gate merge -- input for the manual merge"
            echo "call. The eval-only version delta across all outputs (incl. darwin)"
            echo "is in the **PR description**; this is the build-based half (Linux hosts)."
            echo
            cat /tmp/runtime.md
            echo "### Vulnerability report (vulnix, cimmerian + t14g1)"
            echo
            if [ "$scan_ok" -eq 1 ]; then
              echo "vulnix matches by name+version (false positives expected);"
              echo "darwin/sienna not covered (no Linux build)."
              echo
              echo "<details><summary>Active CVEs in the PR closure -- ${npr} across ${npkg} packages</summary>"
              echo; echo '```'
              if [ -s /tmp/present.txt ]; then cat /tmp/present.txt; else echo "(none)"; fi
              echo '```'; echo "</details>"
              echo
              echo "Delta vs base (${nbase} CVEs): **+${nnew} new, -${nfix} fixed**."
              echo
              echo "**New:**"
              if [ -n "$new" ]; then printf '%s\n' "$new" | sed 's#^#- https://nvd.nist.gov/vuln/detail/#'; else echo "_none_"; fi
              echo
              echo "**Fixed:**"
              if [ -n "$fixed" ]; then printf '%s\n' "$fixed" | sed 's/^/- /'; else echo "_none_"; fi
            else
              echo "> [!WARNING]"
              echo "> vulnix produced no valid JSON for at least one side -- CVE report"
              echo "> unavailable this run. See the job log for the vulnix error."
            fi
          } > delta.md

          # Full report always lands in the job log; the PR comment is capped to
          # GitHub's ~65536-char limit so a big bump can't fail the post itself.
          echo "===== full PR-delta report ====="; cat delta.md
          if [ "$(wc -c < delta.md)" -gt 62000 ]; then
            head -c 62000 delta.md > delta.cap.md
            printf '\n\n> [!NOTE]\n> Report truncated to fit the comment limit -- full version is in the job log.\n' >> delta.cap.md
            mv delta.cap.md delta.md
          fi
          gh pr comment "$PR" --body-file delta.md --edit-last \
            || gh pr comment "$PR" --body-file delta.md

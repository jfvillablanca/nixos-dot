# Build every host on push and PR; cachix-action pushes any new
# store paths to nixos-dot.cachix.org so a fresh machine can pull
# pre-built closures instead of rebuilding from source.
#
# Action revisions are pinned to exact SHAs (not tags) so a tag
# pointer being repointed at a malicious commit can't compromise the
# pipeline silently.
name: build-cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [cimmerian, t14g1]

    steps:
      - name: free disk space
        # jlumbroso/free-disk-space@v1.3.1
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: install nix
        # cachix/install-nix-action@v31.10.5
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: cachix
        # cachix/cachix-action@v17
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: nixos-dot
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: hyprland

      - name: build ${{ matrix.host }}
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --print-build-logs

  # Report-only "PR delta" for the flake-update bot's PR (backlog F.5): per-host
  # package-version changes (`nix store diff-closures`) plus the vulnix CVE
  # delta. Never gates merge -- input for your manual merge decision. Runs ONLY
  # on the bot's PR (head branch `flake-update`) so human PRs aren't noised up.
  # Darwin/sienna is not covered (no Linux CI build for it).
  vuln:
    name: PR delta (closures + CVEs)
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'flake-update'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: free disk space
        # jlumbroso/free-disk-space@v1.3.1
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: install nix
        # cachix/install-nix-action@v31.10.5
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: cachix
        # cachix/cachix-action@v17
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: nixos-dot
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: hyprland

      - name: build closures, diff + scan, post PR-delta comment
        env:
          GH_TOKEN: ${{ secrets.FLAKE_BOT_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          hosts=(cimmerian t14g1)

          # Build the PR closures, then the base closures with the base
          # flake.lock overlaid. The bot only changes flake.lock, so flake.nix
          # is identical -- swapping the lock yields the true base closure.
          build_side() {
            local side=$1 h
            for h in "${hosts[@]}"; do
              nix build ".#nixosConfigurations.$h.config.system.build.toplevel" \
                -o "result-$side-$h" --print-build-logs
            done
          }
          build_side pr
          git checkout "$BASE_SHA" -- flake.lock
          build_side base

          # vulnix per side. It exits non-zero when it finds CVEs, so `|| true`;
          # but a *successful* scan always prints a JSON array -- validate that
          # to tell "0 CVEs" from "scan failed" (no more silent 0/0). CVE ids
          # are regex-extracted so we don't couple to vulnix's JSON schema.
          scan_ok=1
          for side in pr base; do
            outs=()
            for h in "${hosts[@]}"; do outs+=("result-$side-$h"); done
            nix run nixpkgs#vulnix -- --json "${outs[@]}" \
              > "vulnix-$side.json" 2> "vulnix-$side.err" || true
            if jq -e 'type == "array"' "vulnix-$side.json" >/dev/null 2>&1; then
              grep -oE 'CVE-[0-9]{4}-[0-9]{4,}' "vulnix-$side.json" \
                | sort -u > "$side.cve" || true
            else
              scan_ok=0
              : > "$side.cve"
              echo "::warning::vulnix $side scan produced no valid JSON output"
              sed "s/^/vulnix-$side.err: /" "vulnix-$side.err" >&2 || true
            fi
          done

          nbase=$(wc -l < base.cve); npr=$(wc -l < pr.cve)
          new=$(comm -23 pr.cve base.cve || true)
          fixed=$(comm -13 pr.cve base.cve || true)
          nnew=$(printf '%s\n' "$new" | grep -c . || true)
          nfix=$(printf '%s\n' "$fixed" | grep -c . || true)

          {
            echo "## PR delta -- closures + CVEs (cimmerian + t14g1)"
            echo
            echo "Report only; does **not** gate merge. Input for the manual merge call."
            echo
            echo "### Package changes per host (\`nix store diff-closures\`)"
            echo
            for h in "${hosts[@]}"; do
              dc=$(nix store diff-closures "result-base-$h" "result-pr-$h" 2>/dev/null || true)
              n=$(printf '%s\n' "$dc" | grep -c . || true)
              echo "<details><summary><b>$h</b> -- ${n} changed</summary>"
              echo
              echo '```'
              if [ -n "$dc" ]; then printf '%s\n' "$dc"; else echo "(no version changes)"; fi
              echo '```'
              echo
              echo "</details>"
              echo
            done
            echo "### Vulnerability delta (vulnix)"
            echo
            if [ "$scan_ok" -eq 1 ]; then
              echo "Totals -- base: **${nbase}** CVEs, PR: **${npr}** CVEs. Name+version"
              echo "matching (false positives expected); Darwin/sienna not covered."
              echo
              echo "**New: ${nnew}**"
              if [ -n "$new" ]; then printf '%s\n' "$new" | sed 's#^#- https://nvd.nist.gov/vuln/detail/#'; else echo "_none_"; fi
              echo
              echo "**Fixed: ${nfix}**"
              if [ -n "$fixed" ]; then printf '%s\n' "$fixed" | sed 's/^/- /'; else echo "_none_"; fi
            else
              echo "> [!WARNING]"
              echo "> vulnix produced no valid JSON for at least one side -- CVE delta"
              echo "> unavailable this run. See the job log for the vulnix error."
            fi
          } > delta.md

          gh pr comment "$PR" --body-file delta.md --edit-last \
            || gh pr comment "$PR" --body-file delta.md
